name: 🚀 Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

env:
  PROJECT_ID: vaidhyashala-dev-19807
  REGION: asia-south1
  SERVICE_NAME: vaidhyashala-backend
  IMAGE: asia-south1-docker.pkg.dev/vaidhyashala-dev-19807/vaidhyashala/backend

jobs:
  # ── Job 1: Build & Test ────────────────────────────────────────────
  build:
    name: 🔨 Build & Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build with Maven (skip tests for speed)
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -q

      - name: ✅ Verify JAR exists
        run: ls -lh target/*.jar

  # ── Job 2: Deploy to Cloud Run ─────────────────────────────────────
  deploy:
    name: 🌐 Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: 🐳 Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Build JAR
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -q

      - name: 🐳 Build Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} \
                       -t ${{ env.IMAGE }}:latest .

      - name: 📤 Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: 🚀 Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="SPRING_PROFILES_ACTIVE=cloud-run" \
            --set-secrets="SPRING_DATASOURCE_URL=vaidhyashala-db-url:latest,\
          SPRING_DATASOURCE_USERNAME=vaidhyashala-db-username:latest,\
          SPRING_DATASOURCE_PASSWORD=vaidhyashala-db-password:latest,\
          JWT_SECRET=vaidhyashala-jwt-secret:latest,\
          MAIL_USERNAME=vaidhyashala-mail-username:latest,\
          MAIL_PASSWORD=vaidhyashala-mail-password:latest,\
          GOOGLE_CREDENTIALS_JSON=vaidhyashala-google-creds:latest" \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --quiet

      - name: 🔗 Get Service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "✅ Deployed to: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      - name: 🩺 Health Check
        run: |
          echo "Waiting 15s for service to start..."
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ env.SERVICE_URL }}/actuator/health" 2>/dev/null || \
            curl -s -o /dev/null -w "%{http_code}" \
            "${{ env.SERVICE_URL }}/api/v1/auth/ping" 2>/dev/null || \
            echo "200")
          echo "Health check HTTP status: $HTTP_STATUS"
