# =============================================
# Vaidhyashala Backend - Application Configuration
# DB: Neon Migration trigger
# =============================================

spring:
  application:
    name: vaidhyashala-backend

  # ---- JPA / Hibernate (base defaults) ----
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ---- Mail Configuration ----
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ---- Security OAuth2 Client Configuration ----
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            #redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile

# ---- Application Custom Properties ----
app:
  jwt:
    secret: ${JWT_SECRET:dGhpc2lzYXZlcnlzZWN1cmVhbmRsYXJnZWJhc2U2NHNpZ25pbmdrZXlmb3J2YWlkaHlhc2hhbGFkZXZlbG9wbWVudA==}
    expiration-ms: 3600000        # 1 hour
    refresh-expiration-ms: 604800000  # 7 days
  cookie:
    secure: true
    same-site: Lax
  google:
    credentials:
      json: ${GOOGLE_CREDENTIALS_JSON:}
    calendar:
      id: ${GOOGLE_CALENDAR_ID:primary}
  scheduler:
    reminder-cron: "0 */15 * * * *"   # Every 15 minutes
  payment:
    gateway: ${PAYMENT_GATEWAY:test}
  seed:
    provider:
      email: ${SEED_PROVIDER_EMAIL:}
      password: ${SEED_PROVIDER_PASSWORD:}

---
# =============================================
# Profile: local (H2 file DB for local dev)
# =============================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./data/vaidhyashala;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
app:
  google:
    calendar:
      id: mssreeram65@gmail.com
      invite-attendees: false
  cookie:
    secure: false
    same-site: Lax

---
# =============================================
# Profile: cloud-run (Standard PostgreSQL e.g. Neon, Supabase, Aiven)
# =============================================
spring:
  config:
    activate:
      on-profile: cloud-run
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

app:
  google:
    calendar:
      id: ${GOOGLE_CALENDAR_ID:mssreeram65@gmail.com}
      invite-attendees: true
