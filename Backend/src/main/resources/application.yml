# =============================================
# Vaidhyashala Backend - Application Configuration
# =============================================

spring:
  application:
    name: vaidhyashala-backend

  # ---- JPA / Hibernate (base defaults) ----
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ---- Mail Configuration ----
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ---- Application Custom Properties ----
app:
  jwt:
    secret: ${JWT_SECRET:dGhpc2lzYXZlcnlzZWN1cmVhbmRsYXJnZWJhc2U2NHNpZ25pbmdrZXlmb3J2YWlkaHlhc2hhbGFkZXZlbG9wbWVudA==}
    expiration-ms: 900000        # 15 minutes
  google:
    credentials:
      json: ${GOOGLE_CREDENTIALS_JSON:}
    calendar:
      id: ${GOOGLE_CALENDAR_ID:primary}
  scheduler:
    reminder-cron: "0 */15 * * * *"   # Every 15 minutes

---
# =============================================
# Profile: local (H2 file DB for local dev)
# =============================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./data/vaidhyashala;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
app:
  google:
    calendar:
      id: mssreeram65@gmail.com
      invite-attendees: false

---
# =============================================
# Profile: cloud-run (Cloud SQL PostgreSQL on GCP)
# =============================================
spring:
  config:
    activate:
      on-profile: cloud-run
  datasource:
    # Cloud SQL Socket Factory: uses Unix domain socket — no TCP, no public IP needed
    url: jdbc:postgresql://google/${DB_NAME:vaidhyashala}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory&ipTypes=PRIVATE,PUBLIC
    username: ${DB_USERNAME:vaidhyashala_user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

app:
  google:
    calendar:
      id: ${GOOGLE_CALENDAR_ID:mssreeram65@gmail.com}
      invite-attendees: true
